apiVersion: batch/v1
kind: Job
metadata:
  name: dsa-api-migrations
  namespace: dsa-api
spec:
  # Auto-delete the Job object 24h after it finishes — keeps history light
  # without blocking re-apply in the deploy workflow (workflow also explicitly
  # deletes before apply so 'latest tag pinned' jobs don't refuse to recreate).
  ttlSecondsAfterFinished: 86400
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: dsa-api
        component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: alembic
          image: registry.digitalocean.com/agent-search/dsa-api:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DSA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dsa-api-secrets
                  key: DSA_DATABASE_URL
            # Settings() requires DSA_REDIS_URL even though alembic doesn't
            # actually open a Redis connection. Pull it from the same secret
            # so the Settings load doesn't error out.
            - name: DSA_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: dsa-api-secrets
                  key: DSA_REDIS_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
