apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsa-api
  namespace: dsa-api
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # API responses are small (≤ ~100 KB), so we keep nginx defaults for
    # body size + timeouts. If we ever add a bulk-export endpoint, bump
    # proxy-read-timeout here.
spec:
  ingressClassName: nginx
  # Separate TLS secret per host so a cert-manager hiccup on one doesn't
  # invalidate the other. Same isolation pattern as lumed-tls / klarita-tls.
  tls:
    - hosts:
        - api.dsa-api.com
      secretName: dsa-api-tls
    - hosts:
        - docs.dsa-api.com
      secretName: dsa-api-docs-tls
  rules:
    - host: api.dsa-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsa-api
                port:
                  number: 80
    # docs.dsa-api.com hits the same backend; the root route in
    # apps/api/main.py detects the host and 307s to /docs (Swagger UI).
    - host: docs.dsa-api.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsa-api
                port:
                  number: 80
